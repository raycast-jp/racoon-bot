# staging 用 Slack App のマニフェスト（本番と同一ワークスペースに共存させる）
# dev と違い「チーム共有で 1 つ」だけ作る（Request URL が Vercel の固定 URL のため共有できる）
#   1. request_url の YOUR-TEAM を Vercel のチームスラッグに置き換える
#      （正確な URL は staging ブランチのデプロイ後にダッシュボードで確認できる）
#   2. https://api.slack.com/apps → Create New App → From an app manifest に貼り付け
display_information:
  name: racoon-bot-staging
  description: racoon-bot の staging。本番リリース前の動作確認用
  background_color: "#3a7d44"
features:
  bot_user:
    display_name: racoon-bot-staging
    always_online: true
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - channels:read
      - groups:history
      - groups:read
      - im:history
      - mpim:history
      - users:read
      - chat:write
settings:
  event_subscriptions:
    request_url: https://racoon-bot-git-staging-YOUR-TEAM.vercel.app/api/slack/events
    bot_events:
      - app_mention
      - message.channels
      - message.groups
      - message.im
      - message.mpim
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
